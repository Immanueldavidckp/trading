<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daily Plan · trade.scratchforge</title>
<style>
  :root{
    --bg:#0b0f17; --panel:#111826; --panel2:#0d1420; --border:#20293b;
    --ink:#e7edf6; --muted:#93a2ba; --faint:#5f6d84;
    --green:#2fd08c; --red:#ff5d6c; --amber:#e8b24a; --blue:#5e8eff; --violet:#a880ff;
    --green-bg:rgba(47,208,140,.12); --red-bg:rgba(255,93,108,.11); --amber-bg:rgba(232,178,74,.14); --blue-bg:rgba(94,142,255,.12);
    --mono:'JetBrains Mono',ui-monospace,Consolas,monospace;
    --sans:'Segoe UI',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5}
  .mono{font-family:var(--mono)} .num{font-variant-numeric:tabular-nums}
  a{color:var(--blue)}
  header{position:sticky;top:0;z-index:20;background:rgba(11,15,23,.92);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--border);padding:12px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .brand{font-weight:800;font-size:16px;letter-spacing:-.3px}
  .brand span{color:var(--faint);font-weight:400}
  .tabs{display:flex;gap:4px;background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:3px}
  .tab{padding:6px 14px;border-radius:8px;cursor:pointer;font-weight:700;font-size:13px;color:var(--muted);border:none;background:none}
  .tab.on{background:var(--blue);color:#fff}
  .spacer{flex:1}
  select,button.act{background:var(--panel2);color:var(--ink);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-family:var(--mono);font-size:12px;cursor:pointer}
  button.act:hover{border-color:var(--blue)}
  .wrap{max-width:1280px;margin:0 auto;padding:18px}
  .disc{background:var(--amber-bg);border:1px solid rgba(232,178,74,.35);color:var(--amber);border-radius:10px;padding:9px 14px;font-size:12.5px;margin-bottom:16px}
  .disc b{color:var(--ink)}
  .ubar{display:flex;gap:14px;flex-wrap:wrap;align-items:center;color:var(--muted);font-size:12.5px;margin-bottom:14px}
  .ubar b{color:var(--ink)}

  /* plan cards */
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden}
  .chead{display:grid;grid-template-columns:44px 1fr auto;gap:12px;align-items:center;padding:12px 16px;cursor:pointer}
  .chead:hover{background:var(--panel2)}
  .rankn{font-family:var(--mono);font-weight:800;color:var(--faint);text-align:center}
  .sym{font-weight:800;font-size:16px}
  .csub{color:var(--muted);font-size:12px}
  .chips{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .chip{font-family:var(--mono);font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;border:1px solid var(--border);white-space:nowrap}
  .chip.bull{color:var(--green);background:var(--green-bg);border-color:rgba(47,208,140,.4)}
  .chip.bear{color:var(--red);background:var(--red-bg);border-color:rgba(255,93,108,.4)}
  .chip.neut{color:var(--muted)}
  .chip.high{color:var(--green);background:var(--green-bg)} .chip.medium{color:var(--amber);background:var(--amber-bg)} .chip.low{color:var(--faint)}
  .chip.score{color:var(--blue);background:var(--blue-bg)}
  .dlbtn{font-family:var(--mono);font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;
    border:1px solid var(--border);background:var(--panel2);color:var(--muted);cursor:pointer;white-space:nowrap}
  .dlbtn:hover{border-color:var(--blue);color:var(--blue)}
  .chip.lowr{color:var(--red);background:var(--red-bg)}

  /* scorecard: plan (left) vs actual (right) */
  .sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
  @media(max-width:900px){.sc-grid{grid-template-columns:1fr}}
  .colbox{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;min-width:0}
  .colhead{font-family:var(--mono);font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
  .verd{font-family:var(--mono);font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;white-space:nowrap}
  .verd.RIGHT{color:var(--green);background:var(--green-bg)}
  .verd.WRONG{color:var(--red);background:var(--red-bg)}
  .verd.NA,.verd.INFO{color:var(--faint);background:var(--panel)}
  .cbody{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
  .card.open .cbody{display:block}
  .card.open .chead{background:var(--panel2)}
  h4{margin:16px 0 8px;font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--faint);font-family:var(--mono)}
  .lvls{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px}
  .lv{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
  .lv .t{font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;font-family:var(--mono)}
  .lv .v{font-family:var(--mono);font-size:12.5px;margin-top:3px}
  .daytype{background:var(--blue-bg);border:1px solid rgba(94,142,255,.3);border-radius:8px;padding:8px 12px;font-size:12.5px;color:var(--ink)}
  .headline{background:linear-gradient(180deg,rgba(94,142,255,.10),rgba(94,142,255,.03));border:1px solid rgba(94,142,255,.3);border-radius:10px;padding:12px 14px;margin:14px 0 6px}
  .hl-read{font-weight:800;font-size:14.5px;margin-bottom:8px}
  .hl-play{font-size:13px;color:var(--ink);background:var(--green-bg);border-left:3px solid var(--green);padding:7px 11px;border-radius:6px;margin-bottom:9px}
  .hl-if{margin:6px 0 0;padding-left:18px;font-size:12.5px;color:var(--muted)} .hl-if li{margin-bottom:5px}

  table{width:100%;border-collapse:collapse;font-size:12.5px}
  .scroll{overflow-x:auto}
  th{text-align:left;color:var(--faint);font-weight:600;font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;padding:6px 8px;border-bottom:1px solid var(--border);white-space:nowrap}
  td{padding:7px 8px;border-bottom:1px solid var(--border);vertical-align:top}
  tr:last-child td{border-bottom:none}
  .side{font-family:var(--mono);font-weight:800;font-size:11px;padding:2px 7px;border-radius:6px}
  .side.LONG{color:var(--green);background:var(--green-bg)} .side.SHORT{color:var(--red);background:var(--red-bg)}
  .q{font-size:10px;color:var(--faint)}
  .tgt{font-family:var(--mono)} .tgt b{color:var(--green)}
  .whenok{color:var(--muted);font-size:11.5px} .whenno{color:var(--red);font-size:11.5px}
  .scenrow{display:grid;grid-template-columns:1.1fr .8fr 1.4fr;gap:10px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;background:var(--panel2);font-size:12px}
  .scenrow .w{font-family:var(--mono);color:var(--blue)}
  ul.rules{margin:6px 0 0;padding-left:18px;color:var(--muted);font-size:12px} ul.rules li{margin-bottom:5px}
  ul.rules.no li{color:var(--red)}

  /* scorecard */
  .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}
  .tile{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
  .tile .t{font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.07em;font-family:var(--mono)}
  .tile .v{font-size:22px;font-weight:800;margin-top:3px;font-family:var(--mono)}
  .tile .v.pos{color:var(--green)} .tile .v.neg{color:var(--red)}
  .tile .d{font-size:11px;color:var(--muted);margin-top:2px}
  .pos{color:var(--green)} .neg{color:var(--red)}
  .empty{padding:50px;text-align:center;color:var(--faint)}
  .foot{color:var(--faint);font-size:11.5px;margin-top:24px;line-height:1.6}
  @media(max-width:640px){.scenrow{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="brand">trade.scratchforge <span>· daily plan</span></div>
  <div class="tabs">
    <button class="tab on" id="tabPlan" onclick="showTab('plan')">Plan</button>
    <button class="tab" id="tabScore" onclick="showTab('score')">Scorecard</button>
  </div>
  <div class="spacer"></div>
  <button class="act" id="dlAllBtn" onclick="downloadAll()" title="Download the WHOLE day's plan as a text file">⬇ TXT</button>
  <select id="dateSel" onchange="reload()"></select>
  <button class="act" id="buildBtn" onclick="runBuild()" title="Build the plan for the next session (heavy)">⚙ Build next</button>
  <button class="act" id="scoreBtn" onclick="runScore()" title="Score the selected date vs actual candles">✓ Score date</button>
  <a class="act" href="/live.html" style="text-decoration:none">← Chart</a>
</header>

<div class="wrap">
  <div id="status" style="color:var(--muted);font-size:12.5px;margin-bottom:12px;display:none"></div>

  <div id="planView">
    <div class="ubar" id="ubar"></div>
    <div id="cards"></div>
  </div>

  <div id="scoreView" style="display:none">
    <div class="tiles" id="tiles"></div>
    <div class="disc" id="honesty" style="display:none"></div>
    <div class="scroll"><div id="results"></div></div>
  </div>

  <div class="foot" id="foot"></div>
</div>

<script>
const $=id=>document.getElementById(id);
let TAB='plan';
let PLANS=[], PLAN_DATE='';   // last-rendered plan list (for the TXT downloads)
const fmt=(v,d=2)=>(v==null||v===''||isNaN(v))?'—':Number(v).toFixed(d);
const pct=v=>(v==null||isNaN(v))?'—':(v>=0?'+':'')+Number(v).toFixed(2)+'%';

function showTab(t){TAB=t;$('tabPlan').classList.toggle('on',t==='plan');$('tabScore').classList.toggle('on',t==='score');
  $('planView').style.display=t==='plan'?'':'none';$('scoreView').style.display=t==='score'?'':'none';reload();}

async function loadDates(){
  const j=await fetch('/api/plan/dates').then(r=>r.json());
  // Both tabs list every plan date — picking an unscored past date on the
  // Scorecard auto-scores it; a future date shows "not traded yet".
  const dates=[...new Set([...(j.plan_dates||[]),...(j.scored_dates||[])])].sort().reverse();
  const sel=$('dateSel');
  sel.innerHTML = dates.length ? dates.map(d=>`<option value="${d}">${d}</option>`).join('')
                               : '<option value="">— none yet —</option>';
  return dates;
}

async function reload(){
  const dates=await loadDates();
  const date=$('dateSel').value;
  if(TAB==='plan') renderPlan(date); else renderScore(date);
}

// ---------- PLAN ----------
async function renderPlan(date){
  const cards=$('cards'); const ubar=$('ubar');
  if(!date){ ubar.innerHTML=''; cards.innerHTML='<div class="empty">No plan built yet. Click <b>⚙ Build next</b> to generate tomorrow\'s plan for the top-50 stocks under ₹300.</div>'; return; }
  cards.innerHTML='<div class="empty">loading…</div>';
  const j=await fetch('/api/plan/report?date='+date).then(r=>r.json());
  if(!j.ok||!j.plans.length){ cards.innerHTML='<div class="empty">No plans for '+date+'.</div>'; ubar.innerHTML=''; PLANS=[]; return; }
  PLANS=j.plans; PLAN_DATE=date;
  ubar.innerHTML=`Plan for <b>${date}</b> · <b>${j.count}</b> stocks · sorted by confluence score`;
  cards.innerHTML=j.plans.map((p,i)=>planCard(p,i)).join('');
}

function biasChip(b){const c=b==='bullish'?'bull':b==='bearish'?'bear':'neut';return `<span class="chip ${c}">${b}</span>`;}
function planCard(p,i){
  const L=p.levels||{}, pd=L.prev_day||{}, cpr=L.cpr||{}, cam=L.camarilla||{}, piv=L.pivots||{}, z=L.smc_zones||{}, h=p.headline||{};
  const setups=(p.setups||[]).map(s=>`
    <tr>
      <td><span class="side ${s.side}">${s.side}</span></td>
      <td><b>${s.name}</b><div class="q">${s.source}</div></td>
      <td class="mono">${s.trigger_dir==='above'?'▲':'▼'} ${fmt(s.trigger_price)}<div class="q">${s.trigger}</div></td>
      <td class="mono">${fmt(s.entry)}</td>
      <td class="mono neg">${fmt(s.stop)}</td>
      <td class="tgt mono"><b>${(s.targets||[]).map(fmt).join(' · ')}</b>${(s.context_targets||[]).length?`<div class="q">near ${s.context_targets.map(fmt).join(', ')}</div>`:''}</td>
      <td class="mono">${s.rr_t1}R→${s.rr_final}R</td>
      <td class="mono">${s.shares_for_risk??'—'}<div class="q">@₹${s.risk_rupees||1000} risk</div></td>
      <td><div class="whenok">✓ ${s.valid_when}</div><div class="whenno">✗ ${s.skip_when}</div></td>
    </tr>`).join('');
  const scen=(p.open_scenarios||[]).map(s=>`
    <div class="scenrow"><div><span class="w">IF</span> ${s.open_where}</div><div><b>${s.expect}</b></div>
      <div>▸ ${s.do}<div class="whenno">✗ ${s.avoid}</div></div></div>`).join('');
  const zline=arr=>(arr||[]).map(x=>`${x.kind} ${fmt(x.bottom)}–${fmt(x.top)}`).join(' · ')||'—';
  const sw=p.swing_outlook||{};
  return `<div class="card" id="card${i}">
    <div class="chead" onclick="document.getElementById('card${i}').classList.toggle('open')">
      <div class="rankn">${p.universe_rank||i+1}</div>
      <div><div class="sym">${p.tsym} <span class="csub">₹${fmt(p.last_close)} · ${p.day_type_hint?'':''}</span></div>
        <div class="csub">${h.read||''}</div>
        <div class="csub">${p.num_setups} setups · take max ${p.max_trades} · ${p.turnover_cr?('₹'+p.turnover_cr+'cr turnover'):''}</div></div>
      <div class="chips"><button class="dlbtn" onclick="event.stopPropagation();downloadOne(${i})" title="Save ${p.tsym}'s plan as a text file">⬇ TXT</button>${biasChip(p.bias)}<span class="chip ${p.conviction}">${p.conviction}</span><span class="chip score">score ${p.score}</span></div>
    </div>
    <div class="cbody">
      <div class="headline">
        <div class="hl-read">🎯 ${h.read||p.day_type_hint||''}</div>
        ${h.primary_play?`<div class="hl-play"><b>▶ Primary play —</b> ${h.primary_play}</div>`:''}
        <ul class="hl-if">${(h.if_then||[]).map(x=>`<li>${x}</li>`).join('')}</ul>
      </div>
      <div class="daytype">📊 ${p.day_type_hint}</div>
      <h4>Key levels (from today's candle)</h4>
      <div class="lvls">
        <div class="lv"><div class="t">Prev day H/L/C ${pd.date?`· ${pd.date}`:''}</div><div class="v">${fmt(pd.PDH)} / ${fmt(pd.PDL)} / ${fmt(pd.PDC)}</div></div>
        <div class="lv"><div class="t">ATR14 · RVOL</div><div class="v">${fmt(L.atr14)} · ${fmt(L.rvol)}x</div></div>
        <div class="lv"><div class="t">CPR (${cpr.class})</div><div class="v">TC ${fmt(cpr.TC)} · P ${fmt(cpr.P)} · BC ${fmt(cpr.BC)}</div></div>
        <div class="lv"><div class="t">Camarilla H3/H4</div><div class="v">${fmt(cam.H3)} / ${fmt(cam.H4)}</div></div>
        <div class="lv"><div class="t">Camarilla L3/L4</div><div class="v">${fmt(cam.L3)} / ${fmt(cam.L4)}</div></div>
        <div class="lv"><div class="t">Pivots R1/S1</div><div class="v">${fmt(piv.R1)} / ${fmt(piv.S1)}</div></div>
        <div class="lv"><div class="t">SMC supply (above)</div><div class="v">${zline(z.above)}</div></div>
        <div class="lv"><div class="t">SMC demand (below)</div><div class="v">${zline(z.below)}</div></div>
      </div>
      <h4>Where it opens → what to do</h4>
      ${scen}
      <h4>Setups — entries, stops, targets, size, when to skip</h4>
      <div class="scroll"><table><thead><tr>
        <th>Side</th><th>Setup</th><th>Trigger</th><th>Entry</th><th>Stop</th><th>Targets (1R·2R·3R)</th><th>R:R</th><th>Size</th><th>Valid / Skip</th>
      </tr></thead><tbody>${setups}</tbody></table></div>
      <h4>2-day swing outlook</h4>
      <div class="lv"><div class="v">${sw.bias?biasChip(sw.bias):''} ${sw.note||''} · invalidation ${fmt(sw.invalidation)} · 2-day range ${fmt(sw.downside_2d)}–${fmt(sw.upside_2d)}</div></div>
      <h4>Do NOT trade when</h4>
      <ul class="rules no">${(p.no_trade||[]).map(r=>`<li>${r}</li>`).join('')}</ul>
      <h4>Risk rules</h4>
      <ul class="rules">${(p.risk_rules||[]).map(r=>`<li>${r}</li>`).join('')}</ul>
    </div></div>`;
}

// ---------- SCORECARD (plan-vs-actual review) ----------
const _autoScored={};   // date -> true, so a missing scorecard is auto-scored ONCE
async function renderScore(date){
  const tiles=$('tiles'), results=$('results'), honesty=$('honesty');
  if(!date){ tiles.innerHTML=''; results.innerHTML='<div class="empty">No plans built yet.</div>'; honesty.style.display='none'; return; }
  results.innerHTML='<div class="empty">loading…</div>';

  let j=await fetch('/api/plan/scorecard?date='+date).then(r=>r.json());
  if((!j.ok||!(j.results||[]).length) && !_autoScored[date]){
    _autoScored[date]=true;
    setStatus('Scoring the '+date+' plan against actual candles…');
    try{ await fetch('/api/plan/score?plan_date='+date); }catch(e){}
    j=await fetch('/api/plan/scorecard?date='+date).then(r=>r.json());
    setStatus('Scored '+date+'.');
  }
  const rep=await fetch('/api/plan/report?date='+date).then(r=>r.json());
  const planBy={}; (rep.plans||[]).forEach(p=>planBy[p.tsym]=p);

  const res=(j.results||[]);
  if(!res.length){
    tiles.innerHTML=''; honesty.style.display='none';
    results.innerHTML='<div class="empty">No traded candles for <b>'+date+'</b> yet — this session hasn\'t happened (or was a holiday).<br>Pick an earlier date; it will score automatically.</div>';
    return;
  }
  const a=j.scorecard||{};
  const cls=v=>v>0?'pos':v<0?'neg':'';
  tiles.innerHTML=`
    <div class="tile"><div class="t">Plan success (checks)</div><div class="v ${a.checks_success>=0.5?'pos':'neg'}">${a.checks_success!=null?(a.checks_success*100).toFixed(0)+'%':'—'}</div><div class="d">✓${a.checks_right??0} right · ✗${a.checks_wrong??0} wrong across ${a.n_plans??res.length} stocks</div></div>
    <div class="tile"><div class="t">Plans whose primary won</div><div class="v">${a.plan_accuracy!=null?(a.plan_accuracy*100).toFixed(0)+'%':'—'}</div><div class="d">${a.n_plans_correct??0}/${a.n_plans??res.length}</div></div>
    <div class="tile"><div class="t">Hit rate (sim trades)</div><div class="v">${a.hit_rate!=null?(a.hit_rate*100).toFixed(0)+'%':'—'}</div><div class="d">${a.n_win??0}W / ${a.n_loss??0}L · ${a.n_trades??0} trades</div></div>
    <div class="tile"><div class="t">Expectancy / trade</div><div class="v ${cls(a.expectancy_pct)}">${a.expectancy_pct!=null?pct(a.expectancy_pct):'—'}</div><div class="d">${a.expectancy_bps??'—'} bps net of cost</div></div>
    <div class="tile"><div class="t">Book net (1/stock)</div><div class="v ${cls(a.book_net_pct)}">${a.book_net_pct!=null?pct(a.book_net_pct):'—'}</div><div class="d">sum of primary trades</div></div>
    <div class="tile"><div class="t">Profit factor</div><div class="v">${a.profit_factor??'—'}</div><div class="d">gains ÷ losses</div></div>`;
  honesty.style.display='';honesty.innerHTML='📏 <b>Honest read:</b> '+(a.honesty_note||'Plan checks grade the prediction; trade stats are a simulated, cost-adjusted replay. Small samples prove nothing.');

  // sort: best plan-success first, then net
  res.sort((x,y)=>((y.analysis?.success_rate??-1)-(x.analysis?.success_rate??-1)) ||
                  ((y.summary?.book_net_pct??0)-(x.summary?.book_net_pct??0)));
  results.innerHTML=res.map((r,i)=>scoreCard(r,planBy[r.tsym],i)).join('');
}

function scoreCard(r,p,i){
  const A=r.analysis||{}, d=A.day||{}, s=r.summary||{}, prim=s.primary, h=(p&&p.headline)||{};
  const sr=A.success_rate;
  const srChip = sr!=null?`<span class="chip ${sr>=0.5?'high':'lowr'}">✓${A.right} ✗${A.wrong} · ${(sr*100).toFixed(0)}%</span>`:'<span class="chip low">no checks</span>';
  const netChip = (prim&&prim.net_pct!=null)?`<span class="chip ${prim.net_pct>0?'high':'lowr'}">${pct(prim.net_pct)}</span>`:'<span class="chip low">no fill</span>';
  const checks=(A.checks||[]).map(c=>`
    <tr><td style="white-space:nowrap"><b>${c.aspect}</b></td>
        <td>${c.predicted}</td><td>${c.actual}</td>
        <td align="center"><span class="verd ${c.verdict}">${c.verdict==='RIGHT'?'✓ RIGHT':c.verdict==='WRONG'?'✗ WRONG':c.verdict}</span></td></tr>`).join('');
  const plan = p ? `
      ${h.read?`<div style="font-weight:700;margin-bottom:8px">🎯 ${h.read}</div>`:''}
      ${h.primary_play?`<div class="hl-play" style="margin-bottom:10px"><b>▶</b> ${h.primary_play}</div>`:''}
      <div class="mono" style="font-size:12px;line-height:1.9">
        Prev day: ${fmt(p.levels?.prev_day?.PDH)} / ${fmt(p.levels?.prev_day?.PDL)} / ${fmt(p.levels?.prev_day?.PDC)}<br>
        CPR (${p.levels?.cpr?.class}): TC ${fmt(p.levels?.cpr?.TC)} · P ${fmt(p.levels?.cpr?.P)} · BC ${fmt(p.levels?.cpr?.BC)}<br>
        Pivots: R1 ${fmt(p.levels?.pivots?.R1)} · S1 ${fmt(p.levels?.pivots?.S1)} · Camarilla H3 ${fmt(p.levels?.camarilla?.H3)} · L3 ${fmt(p.levels?.camarilla?.L3)}
      </div>
      <div style="margin-top:10px">${(p.setups||[]).map(st=>`
        <div style="font-size:11.5px;padding:4px 0;border-top:1px solid var(--border)">
          <span class="side ${st.side}">${st.side}</span> <b>${st.name}</b> —
          <span class="mono">entry ${fmt(st.entry)} · stop ${fmt(st.stop)} · T ${(st.targets||[]).map(fmt).join('/')}</span>
        </div>`).join('')}
      </div>` : '<div class="q">plan JSON not found for this date</div>';
  const outcomes=(r.setups||[]).map(st=>{
    const badge = st.status==='filled'
      ? `<span class="verd ${st.net_pct>0?'RIGHT':'WRONG'}">${st.net_pct>0?'WIN':'LOSS'} ${pct(st.net_pct)}</span>`
      : `<span class="verd INFO">${st.status.replace(/_/g,' ')}</span>`;
    return `<div style="font-size:11.5px;padding:4px 0;border-top:1px solid var(--border)">
      <span class="side ${st.side}">${st.side}</span> ${st.name} ${badge}
      ${st.status==='filled'?`<span class="mono q"> ${fmt(st.entry)} → ${fmt(st.exit)} · ${st.reached}</span>`:''}
    </div>`;}).join('');
  return `<div class="card" id="sc${i}">
    <div class="chead" onclick="document.getElementById('sc${i}').classList.toggle('open')">
      <div class="rankn">${i+1}</div>
      <div><div class="sym">${r.tsym}</div>
        <div class="csub">${h.read||('conviction '+(r.conviction||'—'))}</div></div>
      <div class="chips">${srChip}${netChip}${s.plan_correct?'<span class="chip high">primary ✓</span>':''}</div>
    </div>
    <div class="cbody">
      <div class="sc-grid">
        <div class="colbox">
          <div class="colhead">The plan (as built the evening before)</div>
          ${plan}
        </div>
        <div class="colbox">
          <div class="colhead">What actually happened</div>
          <div class="mono" style="font-size:12.5px;margin-bottom:10px">
            O ${fmt(d.open)} · H ${fmt(d.high)} · L ${fmt(d.low)} · C ${fmt(d.close)}
            <span class="${(d.return_pct||0)>=0?'pos':'neg'}">(${d.return_pct!=null?(d.return_pct>=0?'+':'')+d.return_pct+'%':'—'} open→close)</span>
            · trendiness ${fmt(d.trendiness)}
          </div>
          <div class="colhead" style="margin-top:4px">Right vs wrong</div>
          <div class="scroll"><table style="font-size:11.5px"><thead><tr><th>Check</th><th>Plan said</th><th>Market did</th><th>Verdict</th></tr></thead>
            <tbody>${checks}</tbody></table></div>
          <div class="colhead" style="margin-top:12px">Setup outcomes (simulated, net of cost)</div>
          ${outcomes||'<div class="q">no setups evaluated</div>'}
        </div>
      </div>
    </div></div>`;
}

// ---------- TXT downloads ----------
const LINE='='.repeat(64), THIN='-'.repeat(64);
function planToText(p){
  const L=p.levels||{}, pd=L.prev_day||{}, cpr=L.cpr||{}, cam=L.camarilla||{}, piv=L.pivots||{}, z=L.smc_zones||{}, h=p.headline||{}, sw=p.swing_outlook||{};
  const zl=a=>(a||[]).map(x=>`${x.kind} ${fmt(x.bottom)}-${fmt(x.top)}`).join(' · ')||'—';
  const out=[];
  out.push(LINE);
  out.push(` ${p.tsym} — ₹${fmt(p.last_close)} · plan for ${p.plan_date||PLAN_DATE}`);
  out.push(` ${String(p.bias||'').toUpperCase()} bias · ${p.conviction} conviction · score ${p.score} · rank ${p.universe_rank||'—'}${p.turnover_cr?` · ₹${p.turnover_cr}cr turnover`:''}`);
  out.push(LINE);
  if(h.read){ out.push('', "TODAY'S READ", `  ${h.read}`); }
  if(h.primary_play){ out.push('', 'PRIMARY PLAY', `  ${h.primary_play}`); }
  if((h.if_then||[]).length){ out.push('', 'IF -> THEN'); h.if_then.forEach(x=>out.push(`  - ${x}`)); }
  out.push('', `DAY TYPE: ${p.day_type_hint||'—'}`);
  out.push('', `KEY LEVELS (from ${pd.date||"today's"} candle)`, THIN);
  out.push(`  Prev day H/L/C : ${fmt(pd.PDH)} / ${fmt(pd.PDL)} / ${fmt(pd.PDC)}   (range ${fmt(pd.range)})`);
  out.push(`  ATR14 · RVOL   : ${fmt(L.atr14)} · ${fmt(L.rvol)}x`);
  out.push(`  CPR (${cpr.class||'—'})   : TC ${fmt(cpr.TC)} · P ${fmt(cpr.P)} · BC ${fmt(cpr.BC)}`);
  out.push(`  Camarilla      : H4 ${fmt(cam.H4)} · H3 ${fmt(cam.H3)} · L3 ${fmt(cam.L3)} · L4 ${fmt(cam.L4)}`);
  out.push(`  Pivots         : R2 ${fmt(piv.R2)} · R1 ${fmt(piv.R1)} · P ${fmt(piv.P)} · S1 ${fmt(piv.S1)} · S2 ${fmt(piv.S2)}`);
  out.push(`  SMC supply ↑   : ${zl(z.above)}`);
  out.push(`  SMC demand ↓   : ${zl(z.below)}`);
  out.push('', 'WHERE IT OPENS -> WHAT TO DO', THIN);
  (p.open_scenarios||[]).forEach(s=>{
    out.push(`  IF ${s.open_where}`);
    out.push(`     EXPECT: ${s.expect}`);
    out.push(`     DO    : ${s.do}`);
    out.push(`     AVOID : ${s.avoid}`, '');
  });
  out.push(`SETUPS — take max ${p.max_trades} trade(s)`, THIN);
  (p.setups||[]).forEach((s,i)=>{
    out.push(`  ${i+1}. [${s.side} · ${s.quality}] ${s.name}   (${s.source})`);
    out.push(`     Trigger : ${s.trigger_dir==='above'?'above':'below'} ${fmt(s.trigger_price)} — ${s.trigger}`);
    out.push(`     Entry ${fmt(s.entry)} · Stop ${fmt(s.stop)} · Targets ${(s.targets||[]).map(fmt).join(' / ')} (${s.rr_t1}R->${s.rr_final}R)`);
    if((s.context_targets||[]).length) out.push(`     Near levels: ${s.context_targets.map(fmt).join(', ')}`);
    out.push(`     Size    : ${s.shares_for_risk??'—'} shares @ ₹${s.risk_rupees||1000} risk`);
    out.push(`     Valid   : ${s.valid_when}`);
    out.push(`     Skip if : ${s.skip_when}`, '');
  });
  out.push('2-DAY SWING OUTLOOK', THIN);
  out.push(`  ${String(sw.bias||'').toUpperCase()} — ${sw.note||'—'}`);
  out.push(`  Invalidation ${fmt(sw.invalidation)} · 2-day range ${fmt(sw.downside_2d)} - ${fmt(sw.upside_2d)}`);
  out.push('', 'DO NOT TRADE WHEN', THIN);
  (p.no_trade||[]).forEach(r=>out.push(`  - ${r}`));
  out.push('', 'RISK RULES', THIN);
  (p.risk_rules||[]).forEach(r=>out.push(`  - ${r}`));
  out.push('', THIN, `  ${p.cost_note||'Analysis only — no orders are placed and no profit is promised.'}`, '');
  return out.join('\n');
}
function downloadText(name, text){
  const blob=new Blob([text],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=name;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href); a.remove();},500);
}
function downloadOne(i){
  const p=PLANS[i]; if(!p) return;
  downloadText(`plan_${p.tsym}_${p.plan_date||PLAN_DATE}.txt`, planToText(p));
}
async function downloadAll(){
  const date=$('dateSel').value; if(!date){ setStatus('Pick a date first.'); return; }
  let plans=PLANS, d=PLAN_DATE;
  if(!plans.length || d!==date){                    // e.g. invoked from the Scorecard tab
    const j=await fetch('/api/plan/report?date='+date).then(r=>r.json());
    if(!j.ok||!j.plans.length){ setStatus('No plans stored for '+date+'.'); return; }
    plans=j.plans; d=date;
  }
  const head=[LINE,` DAILY PLAN — ${d} · ${plans.length} stocks (top volume leaders ≤ ₹300)`,
    ' Sorted by confluence score · Generated by trade.scratchforge backend',
    ' Analysis only — no orders are placed and no profit is promised.',LINE,'',''].join('\n');
  downloadText(`plan_ALL_${d}.txt`, head + plans.map(planToText).join('\n\n'));
}

// ---------- actions ----------
async function runBuild(){
  const b=$('buildBtn'); b.disabled=true; b.textContent='building…';
  setStatus('Building the next-session plan for the top-50 (fetching candles — can take ~1–2 min)…');
  try{ const j=await fetch('/api/plan/build').then(r=>r.json());
    setStatus(`Built ${j.built} plans for ${j.plan_date} (source: ${j.universe_source}, ${j.skipped} skipped).`);
    await reload();
  }catch(e){ setStatus('Build failed: '+e); }
  b.disabled=false; b.textContent='⚙ Build next';
}
async function runScore(){
  const date=$('dateSel').value; if(!date){setStatus('Pick a date first.');return;}
  const b=$('scoreBtn'); b.disabled=true; b.textContent='scoring…';
  setStatus('Scoring '+date+' vs actual candles…');
  try{ const j=await fetch('/api/plan/score?plan_date='+date).then(r=>r.json());
    setStatus(j.ok?`Scored ${j.scored} plans for ${date}.`:'Score: '+(j.error||'failed'));
    showTab('score');
  }catch(e){ setStatus('Score failed: '+e); }
  b.disabled=false; b.textContent='✓ Score date';
}
function setStatus(t){const s=$('status');s.style.display='';s.textContent=t;}
